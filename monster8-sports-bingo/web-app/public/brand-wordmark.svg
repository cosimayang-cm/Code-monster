<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 120" role="img" aria-labelledby="title desc">
  <title id="title">2xbet wordmark</title>
  <desc id="desc">Clean 2xbet brand wordmark with orange kicker and navy main logo.</desc>
  <defs>
    <linearGradient id="wordBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2b4d79" />
      <stop offset="100%" stop-color="#17385f" />
    </linearGradient>
    <linearGradient id="wordOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffac4a" />
      <stop offset="100%" stop-color="#ff7f30" />
    </linearGradient>
  </defs>

  <text x="8" y="22" fill="url(#wordOrange)" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="900" letter-spacing="5">
    2XBET
  </text>

  <text x="8" y="96" fill="url(#wordBlue)" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="88" font-style="italic" font-weight="900" letter-spacing="-4">
    2xbet
  </text>

  <path d="M88 62c10-14 22-21 36-21s26 7 36 21" fill="none" stroke="url(#wordOrange)" stroke-linecap="round" stroke-width="8" />
  <path d="M104 49c7 5 13 11 20 20M145 49c-7 5-13 11-20 20" fill="none" stroke="url(#wordOrange)" stroke-linecap="round" stroke-width="6" />
</svg>
