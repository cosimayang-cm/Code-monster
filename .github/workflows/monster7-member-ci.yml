name: monster7-member-ci

on:
  push:
    paths:
      - "monster7-member/**"
      - "specs/007-cloudflare-member-system/**"
      - ".github/workflows/monster7-member-ci.yml"
  pull_request:
    paths:
      - "monster7-member/**"
      - "specs/007-cloudflare-member-system/**"
      - ".github/workflows/monster7-member-ci.yml"

jobs:
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: monster7-member/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: monster7-member/.node-version
          cache: npm
          cache-dependency-path: monster7-member/api/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: monster7-member/web-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: monster7-member/.node-version
          cache: npm
          cache-dependency-path: monster7-member/web-app/package-lock.json
      - run: npm ci
      - run: npm run build:staging
      - run: npm run build:production
